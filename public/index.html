<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trivia App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Trivia App</h1>
      <p class="subtitle">Pick a category and answer one question at a time.</p>

      <section class="controls">
        <label for="topic">Choose topic</label>
        <select id="topic">
          <option value="science">Science</option>
          <option value="history">History</option>
          <option value="sports">Sports</option>
          <option value="geography">Geography</option>
        </select>
        <button id="generateBtn">Generate Trivia Question</button>
      </section>

      <section id="card" class="card hidden" aria-live="polite">
        <h2 id="question"></h2>
        <div id="answers" class="answers"></div>
        <p id="feedback" class="feedback"></p>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
